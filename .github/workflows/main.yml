name: Deployment

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  skaffold:
    name: 'Skaffold'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Verify System Architecture'
        run: |
          uname -a
          arch

      - name: 'Install Docker'
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -
          sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io
          sudo systemctl start docker
          sudo systemctl enable docker

      - name: 'Install Minikube'
        run: |
          curl -Lo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          chmod +x minikube
          sudo mv minikube /usr/local/bin/

      - name: 'Start Minikube'
        run: |
          minikube start --driver=docker

      - name: 'Set up Kubeconfig for Minikube'
        run: |
          mkdir -p $HOME/.kube
          minikube update-context
          kubectl config current-context

      - name: 'Verify Kubernetes Context'
        run: kubectl config current-context

      - name: 'Download Skaffold'
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: 'Verify Skaffold Installation'
        run: |
          echo "Skaffold location: $(which skaffold)"
          echo "Skaffold file type: $(file /usr/local/bin/skaffold)"
          echo "Skaffold version:"
          skaffold version
          echo "Skaffold help:"
          skaffold --help

      - name: Remove Existing Skaffold Config
        run: |
          if [ -f "skaffold.yaml" ]; then
            rm skaffold.yaml
            echo "Removed existing skaffold.yaml."
          fi

      - name: Skaffold Initialization
        run: skaffold init --skip-build --force

      - name: Build Artifact
        run: skaffold build

      - name: Deploy Artifact
        run: skaffold run

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply --server-side=true -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

      - name: Check ArgoCD version
        run: kubectl get deployments -n argocd -o jsonpath='{.items[*].spec.template.spec.containers[*].image}' | tr -s '[[:space:]]' '\n' | sort | uniq

      - name: Wait for ArgoCD to be ready
        run: |
          echo "Waiting for ArgoCD deployments to be ready..."
          kubectl wait --for=condition=available --timeout=600s deployment/argocd-server -n argocd || echo "argocd-server not found or not ready"
          kubectl wait --for=condition=available --timeout=600s deployment/argocd-repo-server -n argocd || echo "argocd-repo-server not found or not ready"
          
          if kubectl get deployment argocd-application-controller -n argocd &> /dev/null; then
            kubectl wait --for=condition=available --timeout=600s deployment/argocd-application-controller -n argocd || echo "argocd-application-controller not ready"
          elif kubectl get deployment argocd-app-controller -n argocd &> /dev/null; then
            kubectl wait --for=condition=available --timeout=600s deployment/argocd-app-controller -n argocd || echo "argocd-app-controller not ready"
          else
            echo "Application controller deployment not found. Please check ArgoCD installation."
          fi
          
          echo "Checking overall ArgoCD status..."
          kubectl get pods -n argocd

      - name: Get ArgoCD admin password
        id: argo-password
        run: |
          ARGO_PWD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          if [ -z "$ARGO_PWD" ]; then
            echo "Error: Could not retrieve ArgoCD password"
            exit 1
          fi
          echo "::add-mask::$ARGO_PWD"
          echo "password=$ARGO_PWD" >> $GITHUB_OUTPUT

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Update GitHub Secret with ArgoCD Password
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          ARGO_PWD: ${{ steps.argo-password.outputs.password }}
        run: |
          echo "Updating ArgoCD admin password in repository secrets..."
          echo "$ARGO_PWD" | gh secret set ARGOCD_ADMIN_PASSWORD --repo="$REPO" --body=-
          echo "✅ Secret updated successfully!"
        continue-on-error: true

      - name: Apply ArgoCD configurations
        run: |
          kubectl apply -f argocd.yml
          kubectl apply -f argocdserver.yml

      - name: Verify Deployment
        run: |
          kubectl get applications -n argocd
          kubectl get ingress -n argocd

      - name: Deployment Summary
        env:
          ARGO_PWD: ${{ steps.argo-password.outputs.password }}
        run: |
          echo ""
          echo "=========================================="
          echo "🎉 ArgoCD CI Deployment Complete!"
          echo "=========================================="
          echo ""
          echo "⚠️  NOTE: This CI environment is temporary and will be destroyed shortly."
          echo ""
          echo "📋 To access ArgoCD LOCALLY, follow these steps:"
          echo ""
          echo "1️⃣  Install Minikube locally:"
          echo "   https://minikube.sigs.k8s.io/docs/start/"
          echo ""
          echo "2️⃣  Start Minikube:"
          echo "   minikube start --driver=docker"
          echo ""
          echo "3️⃣  Install ArgoCD:"
          echo "   kubectl create namespace argocd"
          echo "   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml"
          echo ""
          echo "4️⃣  Get admin password:"
          echo "   kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"
          echo ""
          echo "5️⃣  Port-forward (keep this running):"
          echo "   kubectl port-forward svc/argocd-server -n argocd 8081:80"
          echo ""
          echo "6️⃣  Open browser:"
          echo "   http://localhost:8081"
          echo ""
          echo "=========================================="
          echo "🔐 Password also saved to GitHub Secret: ARGOCD_ADMIN_PASSWORD"
          echo "=========================================="